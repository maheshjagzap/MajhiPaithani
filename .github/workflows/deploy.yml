name: Deploy React App to EC2 IIS (Demo)

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    # ✅ 1. Checkout Code
    - name: 📥 Checkout Code
      uses: actions/checkout@v3

    # ✅ 2. Setup Node
    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # ✅ 3. Install Dependencies
    - name: 📦 Install Dependencies
      run: npm install

    # ✅ 4. Build React App (IGNORE WARNINGS)
    - name: 🏗️ Build React App
      run: |
        CI=false npm run build

    # ✅ 5. Debug Build Folder
    - name: 📂 Show Build Folder
      run: |
        echo "Build folder contents:"
        ls -la build

    # ✅ 6. Test SSH Connection
    - name: 🔐 Test SSH Connection
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 15.207.106.250
        username: Administrator
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "Connected to EC2 successfully"
          hostname
          whoami

    # ✅ 7. Stop IIS App Pool
    - name: 🛑 Stop IIS App Pool
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 15.207.106.250
        username: Administrator
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          powershell -Command "Import-Module WebAdministration; if ((Get-WebAppPoolState -Name 'Demo').Value -eq 'Started') { Stop-WebAppPool -Name 'Demo' }"

    # ✅ 8. Upload Build Files to IIS
    - name: 🚀 Upload Build to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: 15.207.106.250
        username: Administrator
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "build/*"
        target: "C:/inetpub/ReactApp"
        strip_components: 1

    # ✅ 9. Verify Deployment
    - name: 🔍 Verify Deployment
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 15.207.106.250
        username: Administrator
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          powershell -Command "Get-ChildItem 'C:\inetpub\ReactApp'"

    # ✅ 10. Start IIS App Pool
    - name: ▶️ Start IIS App Pool
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 15.207.106.250
        username: Administrator
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          powershell -Command "Import-Module WebAdministration; if ((Get-WebAppPoolState -Name 'Demo').Value -ne 'Started') { Start-WebAppPool -Name 'Demo' }"

    # ✅ 11. Done
    - name: ✅ Deployment Completed
      run: echo "React Deployment Successful 🚀"
