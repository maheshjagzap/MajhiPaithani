name: Deploy to EC2 IIS (Debug Mode)

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest   
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v3

    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: 🔄 Restore
      run: dotnet restore

    - name: 🏗️ Build
      run: dotnet build --configuration Release

    - name: 📦 Publish
      run: dotnet publish -c Release -o publish

    - name: 📂 Show Publish Folder (DEBUG)
      run: |
        echo "Listing publish folder"
        ls -la publish

    # ✅ Test SSH connection
    - name: 🔐 Test SSH Connection
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 15.207.106.250
        username: Administrator
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "Connected to EC2 successfully"
          hostname
          whoami

    # ✅ Stop IIS App Pool
    - name: 🛑 Stop IIS App Pool
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 15.207.106.250
        username: Administrator
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          powershell -Command "Import-Module WebAdministration; Stop-WebAppPool -Name 'MajhiPaithaniAppPool'"

    # ✅ Upload files to IIS folder
    - name: 🚀 Upload Files to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: 15.207.106.250
        username: Administrator
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "publish/*"
        target: "/c$/inetpub/MajhiPaithaniApp"

    # ✅ Verify deployment
    - name: 🔍 Verify Deployment
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 15.207.106.250
        username: Administrator
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          powershell -Command "Get-ChildItem C:\inetpub\MajhiPaithaniApp"

    # ✅ Start IIS App Pool
    - name: ▶️ Start IIS App Pool
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 15.207.106.250
        username: Administrator
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          powershell -Command "Import-Module WebAdministration; Start-WebAppPool -Name 'MajhiPaithaniAppPool'"

    # ✅ Final success
    - name: ✅ Deployment Completed
      run: echo "Deployment Successful 🚀"
