name: Deploy to EC2 IIS (Debug Mode)

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest   
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v3

    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: 🔄 Restore
      run: dotnet restore

    - name: 🏗️ Build
      run: dotnet build --configuration Release

    - name: 🧹 Clean Publish Folder
      run: rm -rf publish

    - name: 📦 Publish API Only
      run: dotnet publish ./MajhiPaithani.API/MajhiPaithani.API.csproj -c Release -o publish

    - name: 📂 Show Publish Folder (DEBUG)
      run: |
        echo "Listing publish folder"
        ls -la publish

    # ✅ Test SSH connection
    - name: 🔐 Test SSH Connection
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 15.207.106.250
        username: Administrator
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "Connected to EC2 successfully"
          hostname
          whoami

      # ✅ Stop IIS App Pool (SAFE - no error if already stopped)
    - name: 🛑 Stop IIS App Pool
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 15.207.106.250
        username: Administrator
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          powershell -Command "Import-Module WebAdministration; if ((Get-WebAppPoolState -Name 'MajhiPaithani').Value -eq 'Started') { Stop-WebAppPool -Name 'MajhiPaithani' }"
      
        # ✅ Clean IIS Folder (BEST PRACTICE)
    - name: 🧹 Clean IIS Folder
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 15.207.106.250
        username: Administrator
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          powershell -Command "Remove-Item -Path 'C:\inetpub\MajhiPaithaniApp\*' -Recurse -Force -ErrorAction SilentlyContinue"
   
    # ✅ Upload files to IIS folder
    - name: 🚀 Upload Files to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: 15.207.106.250
        username: Administrator
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "publish/*"
        target: "C:/inetpub/MajhiPaithaniApp"
        strip_components: 1

    # ✅ Verify deployment
    - name: 🔍 Verify Deployment
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 15.207.106.250
        username: Administrator
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          powershell -Command "Get-ChildItem 'C:\inetpub\MajhiPaithaniApp'"

    # ✅ Start IIS App Pool (SAFE)
    - name: ▶️ Start IIS App Pool
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 15.207.106.250
        username: Administrator
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          powershell -Command "Import-Module WebAdministration; if ((Get-WebAppPoolState -Name 'MajhiPaithani').Value -ne 'Started') { Start-WebAppPool -Name 'MajhiPaithani' }"

    # ✅ Final success
    - name: ✅ Deployment Completed
      run: echo "Deployment Successful 🚀"
